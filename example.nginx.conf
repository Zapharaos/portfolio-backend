# Rate-limit by IP for analytics first-party (see Frontend : location = /api/send)
# Context http. Zone UNIQUE (pf_umami) since shared with other services (ex: X_umami)
# Two zones with a same name = error "duplicate zone". ~10 r/s + burst 20.
limit_req_zone $binary_remote_addr zone=pf_umami:10m rate=10r/s;

# ─────────────────────────────────────────────
# Portfolio Backend
# ─────────────────────────────────────────────

server {
    listen 80;
    server_name api.domain.com;
    return 301 https://api.domain.com$request_uri;
}

server {
    listen 443 ssl;
    server_name api.domain.com;

    client_max_body_size 10M;

    ssl_certificate /ssl/certificate_fullchain.pem;
    ssl_certificate_key /ssl/certificate_privkey.pem;

    access_log /var/log/nginx/portfolio-backend-access.log combined;
    error_log /var/log/nginx/portfolio-backend-error.log warn;

    location / {
       proxy_pass http://portfolio-backend:8001/;
       proxy_set_header X-Real-IP  $remote_addr;
       proxy_set_header X-Forwarded-For $remote_addr;
       proxy_set_header Host $host;
       proxy_set_header X-Forwarded-Proto $scheme;
       proxy_redirect http://portfolio-backend:8001/ $scheme://$http_host/;
       proxy_http_version 1.1;
       proxy_set_header Upgrade $http_upgrade;
       proxy_set_header Connection $connection_upgrade;
       proxy_read_timeout 20d;
       proxy_buffering off;
   }

   location = /favicon.ico { access_log off; log_not_found off; }
   location /static {
       alias /app/portfolio-backend-static;
   }
}

# ─────────────────────────────────────────────
# Portfolio Frontend
# ─────────────────────────────────────────────

server {
    listen 80;
    server_name domain.com www.domain.com;
    return 301 https://domain.com$request_uri;
}

server {
    listen 443 ssl;
    server_name www.domain.com;

    ssl_certificate /ssl/certificate_fullchain.pem;
    ssl_certificate_key /ssl/certificate_privkey.pem;

    location / {
        return 301 https://domain.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name domain.com;

    ssl_certificate /ssl/certificate_fullchain.pem;
    ssl_certificate_key /ssl/certificate_privkey.pem;

    access_log /var/log/nginx/portfolio-ui-access.log combined;
    error_log /var/log/nginx/portfolio-ui-error.log warn;

    # ── Analytics umami en first-party ──────────────────────────────────────────
    # Le navigateur ne parle qu'à domain.com ; nginx relaie vers umami en coulisses
    # → same-origin (aucun CORS) et très difficile à bloquer par adblock.
    # Prérequis : ce conteneur nginx doit pouvoir joindre `umami` (même réseau Docker,
    # ex. back_vps-network).
    # Côté front : <script data-website-id="…" data-host-url="https://domain.com">.
    # `location =` (exact) prime sur le catch-all `location /` ci-dessous.

    # Script tracker, servi sous un nom neutre (proxifié vers le script d'umami).
    location = /stats.js {
        proxy_pass http://umami:3000/script.js;   # /t.js si UMAMI_TRACKER_SCRIPT_NAME=t côté umami
        proxy_set_header Host $host;
    }

    # Collecte des events, rate-limitée par IP (429 au-delà — l'event est jeté).
    location = /api/send {
        limit_req zone=pf_umami burst=20 nodelay;
        limit_req_status 429;

        # Optionnel — défense d'appoint (falsifiable par un client non-navigateur) :
        # n'accepter que les events dont le Referer vient de ton site. À décommenter
        # avec prudence (le Referer peut manquer selon la politique du navigateur).
        # if ($http_referer !~* "^https://domain\.com/") { return 403; }

        proxy_pass http://umami:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root   /app/portfolio-ui;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }
}