site_name: Portfolio Backend
site_description: Django REST backend powering matthieu-freitag.com — API, data model, health checks and deployment.
site_url: https://zapharaos.github.io/portfolio-backend/
repo_url: https://github.com/Zapharaos/portfolio-backend
repo_name: Zapharaos/portfolio-backend
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - API reference: api.md
  - Data model: models.md
  - Media & files: media.md
  - Health checks: health-checks.md
  - Configuration: configuration.md
  - Deployment: deployment.md
